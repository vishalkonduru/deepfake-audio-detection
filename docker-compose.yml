version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./model.joblib:/app/model.joblib:ro
    environment:
      - MODEL_OUT=/app/model.joblib
      - API_PORT=8000
      - MAX_FILE_SIZE_MB=25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
